tmux_dir="~/.config/tmux"

set -g prefix C-a

set -g mouse on
set -s escape-time 0
set -g set-clipboard on
set -g detach-on-destroy off
set -g renumber-windows on # renumber windows when a window is closed
set -g base-index 1        # start windows numbering at 1
setw -g pane-base-index 1  # make pane numbering consistent with windows
setw -g monitor-activity on
set-option -g history-limit 50000

# Terminal colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:RGB'
set -ag terminal-overrides ",xterm*:Tc"

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Image support
set -gq allow-passthrough all
set -g visual-activity off

# set focus events on for nvim
set -g focus-events on

set-option -g xterm-keys on
set -s extended-keys on
set -as terminal-features ',*:extkeys'


# reload config
bind r source-file "$tmux_dir/tmux.conf" \; display-message "Config reloaded..."

bind C-c new-session
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane -a
bind X kill-window -a
bind Space resize-pane -Z
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1

bind g new-window -c "#{pane_current_path}" lazygit 
bind G run-shell "tmux switch-client -t gh-dash || tmux new-session -d -s gh-dash gh dash && tmux switch-client -t gh-dash"

bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'popup' zsh
bind-key s display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'sesh' tv sesh

# Copy mode
# setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'wfxr/tmux-fzf-url'
# set -g @plugin 'tmux-plugins/tmux-cpu'

# Themes
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_peach},##{?pane_synchronized,fg=#{@thm_rosewater},fg=#{@thm_peach}}}"

set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

set -g status-right ""
# set -ga status-right "#[bg=default,fg=#{@thm_green},bold]   #{cpu_percentage} "
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
# set -ga status-right "#[bg=default,fg=#{@thm_blue},bold]   #{ram_percentage} "

set-option -g status-position top
set -g status-right-length 100
set -g status-left-length 100

set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

set -g pane-border-format ""
setw -g pane-border-status top
setw -g pane-border-lines single

set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Smart splits
set -g @smart-splits_resize_left_key  'M-Left'
set -g @smart-splits_resize_down_key  'M-Down'
set -g @smart-splits_resize_up_key    'M-Up'
set -g @smart-splits_resize_right_key 'M-Right'

# Bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

